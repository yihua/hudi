# One-shot Job that creates the `warehouse` bucket in the local-dev MinIO.
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-make-bucket
  namespace: hudi-lakehouse
  labels:
    app.kubernetes.io/part-of: hudi-lakehouse
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio-make-bucket
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: quay.io/minio/mc:RELEASE.2024-11-21T17-21-54Z
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until mc alias set local http://minio:9000 admin password; do
                echo "waiting for minio..."; sleep 3
              done
              mc mb --ignore-existing local/warehouse
              mc ls local
