apiVersion: v2
name: hudi-trino
description: >-
  Trino query engine with the Apache Hudi connector built from the Hudi
  repository. Deploy against an existing Hive Metastore (or AWS Glue) and
  object storage to serve SQL over Hudi tables.
type: application
version: 0.1.0
# The Trino server version is pinned by the plugin's strict SPI version check.
appVersion: "472"
keywords:
  - hudi
  - trino
  - lakehouse
home: https://hudi.apache.org
sources:
  - https://github.com/apache/hudi
