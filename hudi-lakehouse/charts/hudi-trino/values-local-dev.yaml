# Values used by local-dev/scripts/up.sh to point the hudi-trino chart at the
# in-cluster MinIO + Hive Metastore that local-dev stands up. Also serves as a
# worked example of configuring the chart against custom infrastructure.
fullnameOverride: hudi-trino

catalog:
  metastore:
    type: thrift
    uri: thrift://hive-metastore.hudi-lakehouse.svc.cluster.local:9083
  filesystem:
    s3:
      enabled: true
      endpoint: http://minio.hudi-lakehouse.svc.cluster.local:9000
      region: us-east-1
      pathStyleAccess: true
      # Fixed local-dev credentials (see local-dev/manifests/minio.yaml).
      accessKey: admin
      secretKey: password

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    memory: 4Gi
