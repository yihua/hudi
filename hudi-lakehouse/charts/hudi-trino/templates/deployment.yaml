apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hudi-trino.fullname" . }}
  labels:
    {{- include "hudi-trino.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "hudi-trino.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hudi-trino.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll the pod when the catalog config changes.
        checksum/catalog: {{ include (print $.Template.BasePath "/configmap-catalog.yaml") . | sha256sum }}
    spec:
      containers:
        - name: trino
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            {{- with include "hudi-trino.s3SecretName" . }}
            - name: HUDI_TRINO_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ . }}
                  key: accessKey
            - name: HUDI_TRINO_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ . }}
                  key: secretKey
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: catalog
              mountPath: /etc/trino/catalog
          readinessProbe:
            httpGet:
              path: /v1/info
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/info
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: catalog
          configMap:
            name: {{ include "hudi-trino.fullname" . }}-catalog
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
