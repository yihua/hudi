# Default values for the hudi-trino chart.
#
# This chart deploys ONLY Trino (with the Hudi connector built from this
# repository). It expects the catalog (Hive Metastore or AWS Glue) and the
# object storage to already exist -- point the values below at them. For a
# self-contained laptop environment that stands those up too, see
# hudi-lakehouse/local-dev/.

nameOverride: ""
fullnameOverride: ""

image:
  # Built by hudi-lakehouse/scripts/build-images.sh. For real clusters,
  # push to a registry and override the repository.
  repository: hudi-lakehouse-trino
  # The tag tracks the pinned Trino server version (strict SPI match).
  tag: "472"
  pullPolicy: IfNotPresent

catalog:
  # Name of the Trino catalog exposing Hudi tables (i.e. `SELECT .. FROM <name>.<db>.<table>`).
  name: hudi
  metastore:
    # thrift | glue
    type: thrift
    # Required when type=thrift, e.g. thrift://hive-metastore.default.svc:9083
    uri: ""
    # Optional extra properties for glue (region etc.), rendered verbatim.
    glueProperties: {}
  filesystem:
    s3:
      enabled: true
      # Leave endpoint empty for real AWS S3; set for MinIO/other S3-compatible stores.
      endpoint: ""
      region: us-east-1
      pathStyleAccess: false
      # Static credentials are injected via a Secret and referenced from the
      # catalog file through environment substitution -- they never appear in
      # the ConfigMap. Leave both empty to use the pod's IAM identity (IRSA etc.).
      accessKey: ""
      secretKey: ""
      # Name of an existing Secret with keys `accessKey` and `secretKey`;
      # takes precedence over the inline values above.
      existingSecret: ""
  # Extra key=value pairs appended verbatim to the Hudi catalog properties.
  extraProperties: {}
  # Include the tpch catalog for connectivity sanity checks (SELECT 1 etc.).
  tpchEnabled: true

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: "1"
    memory: 4Gi
  limits:
    memory: 6Gi

# Extra environment variables for the Trino container (e.g. to surface
# additional secrets for ${ENV:...} substitution in extraProperties).
extraEnv: []

nodeSelector: {}
tolerations: []
affinity: {}
