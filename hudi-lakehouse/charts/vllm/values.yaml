# Default values for the vllm chart.
#
# One vLLM server, one model, chosen at install time. OPTIONAL and GPU-only:
# the out-of-box gateway experience uses Ollama; install this chart when you
# want a bigger open-weight model served in-cluster, then point the
# hudi-agent-gateway at it:
#
#   helm install vllm hudi-lakehouse/charts/vllm --set model=Qwen/Qwen3-8B
#   helm upgrade hudi-agent-gateway ... \
#     --set gateway.provider=openai-compatible \
#     --set gateway.openaiCompatible.baseUrl=http://vllm:8000/v1 \
#     --set gateway.model=Qwen/Qwen3-8B

nameOverride: ""
fullnameOverride: ""

image:
  repository: vllm/vllm-openai
  tag: "v0.25.0-ubuntu2404"
  pullPolicy: IfNotPresent

# The Hugging Face model to serve. UNGATED defaults work with no token:
#   Qwen/Qwen3-8B           (default; Apache-2.0, tool calling)
#   Qwen/Qwen3-32B          (bigger; needs ~2x A100-40GB or 1x A100-80GB)
#   openai/gpt-oss-20b      (Apache-2.0)
# GATED models (meta-llama/*, mistralai/*, google/gemma*) additionally need
# an HF_TOKEN key in the secret referenced below.
model: Qwen/Qwen3-8B

# Extra CLI args appended to the vLLM server (e.g. --max-model-len 16384,
# --tensor-parallel-size 2, --enable-auto-tool-choice --tool-call-parser hermes).
extraArgs:
  # Tool calling is required by the hudi-agent-gateway agent loop; hermes is the
  # right parser for Qwen models -- adjust when changing model families.
  - --enable-auto-tool-choice
  - --tool-call-parser
  - hermes

# Secret with standard env-var keys (HF_TOKEN for gated models). Same
# convention as the hudi-agent-gateway chart: mounted via envFrom.
existingSecret: ""

# Model weights cache; strongly recommended so pod restarts don't re-download.
persistence:
  enabled: true
  size: 60Gi
  storageClass: ""

resources:
  requests:
    cpu: "4"
    memory: 24Gi
    nvidia.com/gpu: 1
  limits:
    memory: 32Gi
    nvidia.com/gpu: 1

service:
  type: ClusterIP
  port: 8000

# vLLM startup (download + load + CUDA graph capture) can take many minutes
# on first boot; the startup probe budget covers it.
startupProbe:
  failureThreshold: 120
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
