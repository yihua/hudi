apiVersion: v2
name: vllm
description: >-
  vLLM serving one open-weight model behind an OpenAI-compatible API, for use
  as the hudi-agent-gateway's in-cluster LLM (gateway provider
  "openai-compatible"). Requires a GPU node.
type: application
version: 0.1.0
appVersion: "v0.25.0"
keywords:
  - vllm
  - llm
  - inference
  - lakehouse
home: https://hudi.apache.org
sources:
  - https://github.com/apache/hudi
