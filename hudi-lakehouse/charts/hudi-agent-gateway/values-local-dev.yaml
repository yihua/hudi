# Values used by local-dev/scripts/up.sh: the gateway talks to the in-cluster
# Trino and to Ollama running on the developer's laptop. Switch to a hosted
# provider with e.g.:
#   helm upgrade hudi-agent-gateway ... --set gateway.provider=anthropic \
#     --set gateway.anthropicApiKey=$ANTHROPIC_API_KEY
fullnameOverride: hudi-agent-gateway

gateway:
  provider: ollama
  # A small tool-capable model that fits a laptop; `ollama pull qwen3:4b`.
  # (1.7b also works but makes more reasoning mistakes on SQL tasks.)
  model: qwen3:4b
  ollama:
    baseUrl: http://host.minikube.internal:11434

trino:
  host: hudi-trino.hudi-lakehouse.svc.cluster.local
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi
